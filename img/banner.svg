<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
  </defs>

  <!-- Фон -->
  <rect width="900" height="200" fill="url(#grad)" rx="12" />

  <!-- Сетка (лёгкая) -->
  <g stroke="#334155" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="50" x2="900" y2="50" />
    <line x1="0" y1="100" x2="900" y2="100" />
    <line x1="0" y1="150" x2="900" y2="150" />
    <line x1="150" y1="0" x2="150" y2="200" />
    <line x1="300" y1="0" x2="300" y2="200" />
    <line x1="450" y1="0" x2="450" y2="200" />
    <line x1="600" y1="0" x2="600" y2="200" />
    <line x1="750" y1="0" x2="750" y2="200" />
  </g>

  <!-- Текст -->
  <text x="60" y="85" fill="white" font-family="monospace" font-size="24" font-weight="600">
    Anton Leshev
  </text>

  <text x="60" y="120" fill="url(#textGrad)" font-family="monospace" font-size="20" font-weight="500">
    Backend Developer • Student @ KNRTU-KAI
  </text>

  <text x="60" y="150" fill="#94a3b8" font-family="monospace" font-size="16">
    Building systems • Learning daily • Focused on progress
  </text>
</svg>